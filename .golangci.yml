version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA5011"  # false positive: t.Fatal stops execution but analyzer doesn't see it
        - "-ST1000"  # package comments — not enforced in this project
        - "-ST1016"  # receiver name consistency — prompt_builder uses "bc" throughout, other files use "s"

issues:
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
